# Increase Gradle heap to avoid OOM during D8/R8 dexing.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Reduce parallelism to lower peak memory during D8/R8.
org.gradle.workers.max=1

# Keep build behavior stable on limited-memory machines.
android.useAndroidX=true
android.enableJetifier=true

